events {
    worker_connections 1024;
}

http {
    upstream capops_backend {
        server localhost:8001 fail_timeout=10s max_fails=3;
        server localhost:8002 fail_timeout=10s max_fails=3;
    }

    server {
        listen 80;
        
        # Add header for worker identification
        add_header X-Served-By $upstream_addr always;

        location /api/ {
            proxy_pass http://capops_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            root C:/Users/HP/Desktop/Hackathon/capops-agent/frontend/dist;
            try_files $uri /index.html;
            include mime.types;
        }
    }
}
